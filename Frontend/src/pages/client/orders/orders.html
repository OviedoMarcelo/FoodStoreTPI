<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../style.css">
    <title>Food Store - Mis Pedidos</title>
</head>

<body>

    <header>
        <nav>
            <div class="nav-logo">
                <span class="logo-food">Food</span><span class="logo-store">Store</span>
            </div>
            <ul class="nav-links">
                <li><a href="/src/pages/store/home/home.html">Inicio</a></li>
                <li><a href="/src/pages/client/orders/orders.html">Mis Pedidos</a></li>
                <li><a href="/src/pages/store/cart/cart.html" class="nav-cart">
                        Carrito <span id="cart-count" class="cart-badge">0</span>
                    </a></li>
            </ul>
            <div class="nav-user">
                <span id="nav-username">Cargando...</span>
                <button id="btn-logout" class="btn-logout">Cerrar sesión</button>
            </div>
        </nav>
    </header>

    <main class="orders-layout">
        <div class="orders-header">
            <h1>Mis Pedidos</h1>
        </div>

        <div id="orders-container" class="orders-container">
            <!-- Pedidos se renderizan acá -->
        </div>
    </main>

    <!-- Modal de detalle de pedido -->
    <div id="modal-order" class="modal-overlay" style="display:none;">
        <div class="modal modal-order">
            <div class="modal-header">
                <h2>Detalle del Pedido</h2>
                <button id="btn-close-order-modal" class="modal-close">✕</button>
            </div>
            <div id="modal-order-body" class="modal-body">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <footer>
        <p>Food Store 2026 🍔🍟 — Todos los derechos reservados</p>
        <p>Contacto: <a href="mailto:info@foodstore.com.ar">info@foodstore.com.ar</a></p>
    </footer>

    <script type="module" src="./orders.ts"></script>

</body>

</html>
