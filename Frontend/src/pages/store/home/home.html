<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../style.css">
    <title>Food Store - Home</title>
</head>

<body>

    <!-- ============================================================
         ENCABEZADO - Navbar sticky con logo, navegación y usuario
    ============================================================ -->
    <header>
        <nav>
            <!-- Logo -->
            <div class="nav-logo">
                <span class="logo-food">Food</span><span class="logo-store">Store</span>
            </div>

            <!-- Links de navegación -->
            <ul class="nav-links">
                <li><a href="/src/pages/store/home/home.html">Inicio</a></li>
                <li><a href="/src/pages/store/cart/cart.html" class="nav-cart">
                        Carrito <span id="cart-count" class="cart-badge">0</span>
                    </a></li>
            </ul>

            <!-- Info del usuario logueado -->
            <div class="nav-user">
                <span id="nav-username">Cargando...</span>
                <button id="btn-logout" class="btn-logout">Cerrar sesión</button>
            </div>
        </nav>
    </header>
    <!-- FIN ENCABEZADO -->


    <!-- ============================================================
         CONTENIDO PRINCIPAL - Grid de 2 columnas: sidebar + content
    ============================================================ -->
    <main class="home-layout">

        <!-- Sidebar de categorías -->
        <aside class="sidebar">
            <h3 class="sidebar-title">Categorías</h3>
            <ul id="categories-list"></ul>
        </aside>

        <!-- Contenido: buscador + grilla de productos -->
        <div class="content">

            <!-- Buscador -->
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Buscar productos..." autocomplete="off" />
            </div>

            <!-- Grilla de productos -->
            <section id="contenedor-productos" class="products-grid"></section>

            <!-- Mensaje cuando no hay resultados -->
            <p id="no-resultados" class="no-results" style="display: none;">
                No se encontraron productos 😕
            </p>

        </div>

    </main>
    <!-- FIN CONTENIDO PRINCIPAL -->


    <!-- ============================================================
         PIE DE PÁGINA
    ============================================================ -->
    <footer>
        <p>Food Store 2026 🍔🍟 — Todos los derechos reservados</p>
        <p>
            Contacto:
            <a href="mailto:info@foodstore.com.ar">info@foodstore.com.ar</a>
        </p>
    </footer>
    <!-- FIN PIE DE PÁGINA -->

    <!-- Script principal de la página -->
    <script type="module" src="./home.ts"></script>

</body>

</html>
