<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../style.css">
    <title>Food Store - Carrito</title>
</head>

<body>

    <!-- ============================================================
         ENCABEZADO - Navbar sticky con logo, navegación y usuario
    ============================================================ -->
    <header>
        <nav>
            <!-- Logo -->
            <div class="nav-logo">
                <span class="logo-food">Food</span><span class="logo-store">Store</span>
            </div>

            <!-- Links de navegación -->
            <ul class="nav-links">
                <li><a href="/src/pages/store/home/home.html">Inicio</a></li>
                <li><a href="/src/pages/client/orders/orders.html">Mis Pedidos</a></li>
                <li><a href="/src/pages/store/cart/cart.html" class="nav-cart">
                        Carrito <span id="cart-count" class="cart-badge">0</span>
                    </a></li>
            </ul>

            <!-- Info del usuario logueado -->
            <div class="nav-user">
                <span id="nav-username">Cargando...</span>
                <button id="btn-logout" class="btn-logout">Cerrar sesión</button>
            </div>
        </nav>
    </header>
    <!-- FIN ENCABEZADO -->


    <!-- ============================================================
         CONTENIDO PRINCIPAL 
    ============================================================ -->
    <main class="cart-layout">
        <div class="cart-container">
            <h2>Tu Carrito</h2>
            <div id="cart-items" class="cart-items">
                <!-- Aquí se cargarán los productos del carrito -->
            </div>
        </div>
        <div class="cart-summary">
            <h2>Resumen de compra</h2>
            <p>Cant. de productos: <span id="cart-quantity">0</span></p>
            <div class="cart-summary-breakdown">
                <p>Subtotal: <span>$<span id="cart-subtotal">0</span></span></p>
                <p>Envío: <span>$<span id="cart-envio">1.000</span></span></p>
                <hr>
                <p class="cart-summary-total">Total: <span>$<span id="cart-total">0</span></span></p>
            </div>
            <button id="checkout-btn" class="btn-checkout">Proceder al Pago</button>
            <button id="btn-vaciar" class="btn-logout">Vaciar carrito</button>
        </div>
    </main>
    <!-- FIN CONTENIDO PRINCIPAL -->


    <!-- ============================================================
         PIE DE PÁGINA
    ============================================================ -->
    <footer>
        <p>Food Store 2026 🍔🍟 — Todos los derechos reservados</p>
        <p>
            Contacto:
            <a href="mailto:info@foodstore.com.ar">info@foodstore.com.ar</a>
        </p>
    </footer>
    <!-- FIN PIE DE PÁGINA -->

    <!-- Script principal de la página -->
    <script type="module" src="./cart.ts"></script>


    <!-- Modal de confirmación de pedido -->
    <div id="modal-checkout" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h2>Completar Pedido</h2>
                <button id="btn-close-modal" class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <label>Teléfono</label>
                <input type="text" id="input-phone" placeholder="Ej: +54 9 261 123-4567" />

                <label>Dirección de Entrega</label>
                <textarea id="input-address" placeholder="Calle, número, piso, depto"></textarea>

                <label>Método de Pago</label>
                <select id="input-payment">
                    <option value="">Seleccione un método</option>
                    <option value="cash">Efectivo</option>
                    <option value="card">Tarjeta</option>
                    <option value="transfer">Transferencia</option>
                </select>

                <label>Notas adicionales (opcional)</label>
                <textarea id="input-notes" placeholder="Instrucciones especiales, timbre, etc."></textarea>

                <p class="modal-total">Total a pagar: <strong id="modal-total-price">$0</strong></p>
            </div>
            <div class="modal-footer">
                <button id="btn-confirm-order" class="btn-submit">Confirmar Pedido</button>
            </div>
        </div>
    </div>


</body>

</html>
