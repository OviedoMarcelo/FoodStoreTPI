<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../style.css">
    <title>Food Store - Pedidos Admin</title>
</head>
<body class="admin-body">

    <div class="admin-layout">

        <aside class="admin-sidebar">
            <div class="admin-sidebar-logo">
                <span class="logo-food">Food</span><span class="logo-store">Store</span>
                <span class="admin-label">Admin</span>
            </div>
            <nav class="admin-nav">
                <a href="/src/pages/admin/adminHome/home.html" class="admin-nav-link">Dashboard</a>
                <a href="/src/pages/admin/categories/categories.html" class="admin-nav-link">Categorías</a>
                <a href="/src/pages/admin/products/products.html" class="admin-nav-link">Productos</a>
                <a href="/src/pages/admin/orders/orders.html" class="admin-nav-link active">Pedidos</a>
                <a href="/src/pages/store/home/home.html" class="admin-nav-link">Ver Tienda</a>
            </nav>
            <div class="admin-sidebar-footer">
                <span id="nav-username"></span>
                <button id="btn-logout" class="btn-logout">Cerrar sesión</button>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-page-header">
                <h1 class="admin-title">Gestión de Pedidos</h1>
                <select id="filter-status" class="admin-filter-select">
                    <option value="">Todos los estados</option>
                    <option value="pending">Pendiente</option>
                    <option value="processing">En preparación</option>
                    <option value="completed">Entregado</option>
                    <option value="cancelled">Cancelado</option>
                </select>
            </div>

            <div id="orders-container" class="orders-container"></div>
        </main>
    </div>

    <!-- Modal detalle de pedido -->
    <div id="modal-order" class="modal-overlay" style="display:none;">
        <div class="modal modal-order">
            <div class="modal-header">
                <h2>Detalle del Pedido</h2>
                <button id="btn-close-order-modal" class="modal-close">✕</button>
            </div>
            <div id="modal-order-body" class="modal-body"></div>
        </div>
    </div>

    <script type="module" src="./orders.ts"></script>
</body>
</html>
