<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../style.css">
    <title>Food Store - Productos</title>
</head>
<body class="admin-body">

    <div class="admin-layout">

        <aside class="admin-sidebar">
            <div class="admin-sidebar-logo">
                <span class="logo-food">Food</span><span class="logo-store">Store</span>
                <span class="admin-label">Admin</span>
            </div>
            <nav class="admin-nav">
                <a href="/src/pages/admin/adminHome/home.html" class="admin-nav-link">Dashboard</a>
                <a href="/src/pages/admin/categories/categories.html" class="admin-nav-link">Categorías</a>
                <a href="/src/pages/admin/products/products.html" class="admin-nav-link active">Productos</a>
                <a href="/src/pages/admin/orders/orders.html" class="admin-nav-link">Pedidos</a>
                <a href="/src/pages/store/home/home.html" class="admin-nav-link">Ver Tienda</a>
            </nav>
            <div class="admin-sidebar-footer">
                <span id="nav-username"></span>
                <button id="btn-logout" class="btn-logout">Cerrar sesión</button>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-page-header">
                <h1 class="admin-title">Productos</h1>
                <button id="btn-new-product" class="btn-submit">+ Nuevo Producto</button>
            </div>

            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Precio</th>
                            <th>Categoría</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal crear/editar producto -->
    <div id="modal-product" class="modal-overlay" style="display:none;">
        <div class="modal modal-wide">
            <div class="modal-header">
                <h2 id="modal-product-title">Nuevo Producto</h2>
                <button id="btn-close-product-modal" class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <label>Nombre</label>
                <input type="text" id="input-prod-name" placeholder="Nombre del producto" />
                <label>Descripción</label>
                <textarea id="input-prod-description" placeholder="Descripción"></textarea>
                <label>Precio</label>
                <input type="number" id="input-prod-price" placeholder="0" min="1" />
                <label>Stock</label>
                <input type="number" id="input-prod-stock" placeholder="0" min="0" />
                <label>Categoría</label>
                <select id="input-prod-category"></select>
                <label>Imagen (URL)</label>
                <input type="text" id="input-prod-image" placeholder="/images/mi-imagen.png" />
                <label>
                    <input type="checkbox" id="input-prod-available" checked /> Disponible
                </label>
            </div>
            <div class="modal-footer">
                <button id="btn-save-product" class="btn-submit">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal confirmar eliminación -->
    <div id="modal-delete" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h2>Confirmar eliminación</h2>
                <button id="btn-close-delete-modal" class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <p>¿Estás seguro que querés eliminar este producto?</p>
            </div>
            <div class="modal-footer" style="gap:1rem; display:flex;">
                <button id="btn-confirm-delete" class="btn-submit">Eliminar</button>
                <button id="btn-cancel-delete" class="btn-logout">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="./products.ts"></script>
</body>
</html>
