<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../style.css">
    <title>Registro</title>
</head>

<body>
    <main class="container">
        <div>
            <form class="login-form" id="form-registro" action="">
                <h1>Food Store 🍔🍟</h1>
                <h2>Registro</h2>

                <div>
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" placeholder="Ingresa tu nombre" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Ingresa tu correo" required>

                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button class="btn-submit" type="submit">Registrarse</button>
                <p>¿Ya tienes una cuenta? <a href="../login/login.html">Inicia Sesión</a></p>

            </form>

        </div>

    </main>
    <script type="module" src="./registro.ts"></script>
</body>

</html>
